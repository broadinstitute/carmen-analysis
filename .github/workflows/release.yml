name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write   # PyPI trusted publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    # Trusted publisher must be configured on PyPI for this project +
    # workflow + environment. Until then the job is a no-op gate that
    # surfaces the missing configuration as a clear error rather than
    # silently skipping. See: https://docs.pypi.org/trusted-publishers/
    environment:
      name: pypi
      url: https://pypi.org/p/carmen-analysis
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
